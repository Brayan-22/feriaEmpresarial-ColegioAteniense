name: Deploy FeriaEmpresarial Ateniense

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:    # ← agrega esto

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: feriaescolar-backend
  ECS_CLUSTER: feriaescolar-cluster
  ECS_SERVICE: feriaescolar-service
  TASK_DEFINITION_FAMILY: feriaescolar-backend
  CONTAINER_NAME: feriaescolar-api

jobs:
  # ════════════════════════════════════════════════════════════
  #  Detectar qué cambió
  # ════════════════════════════════════════════════════════════
  changes:
    name: Detectar cambios
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'feria-backend/**'
            frontend:
              - 'feria-frontend/**'

  # ════════════════════════════════════════════════════════════
  #  BACKEND — Test + Docker Build + Push ECR + Deploy ECS
  # ════════════════════════════════════════════════════════════
  deploy-backend:
    name: Backend · Test + Deploy ECS
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: feria-backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Instalar Python 3.12
        run: uv python install 3.12

      - name: Instalar dependencias
        run: uv sync --frozen

      - name: Lint con ruff
        run: uv run ruff check .
        continue-on-error: true

      - name: Tests
        run: uv run pytest --tb=short -q
        continue-on-error: true

      - name: Configurar credenciales AWS
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push de imagen Docker a ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Descargar task definition actual
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION_FAMILY }} \
            --query taskDefinition \
            | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection)' \
            > /tmp/task-definition.json

      - name: Actualizar imagen en task definition
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy en ECS
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: URL del deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: echo "✅ Backend desplegado → https://apiemprendeateniense.bacode.online"

  # ════════════════════════════════════════════════════════════
  #  FRONTEND — Build + S3 + CloudFront invalidation
  # ════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Frontend · Build + Deploy S3
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/master'
    defaults:
      run:
        working-directory: feria-frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: feria-frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build producción
        run: pnpm build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Subir build a S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 cp dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidar caché CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: URL del deploy
        run: echo "✅ Frontend desplegado → https://emprendeateniense.bacode.online"